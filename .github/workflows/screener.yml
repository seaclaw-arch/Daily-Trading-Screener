name: Daily IDX Screener

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: 📂 DEBUG - Lihat isi direktori
        run: |
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo ""
          echo "=== ALL FILES (ls -la) ==="
          ls -la
          echo ""
          echo "=== CHECK sniper.py ==="
          if [ -f sniper.py ]; then
            echo "✅ File sniper.py DITEMUKAN!"
            echo "Ukuran file:"
            ls -lh sniper.py
          else
            echo "❌ File sniper.py TIDAK DITEMUKAN!"
            echo "File yang ada:"
            find . -name "*sniper*" -o -name "*Sniper*"
          fi
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy
      
      - name: Run IDX Sniper Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper.py
