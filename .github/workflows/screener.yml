name: Daily IDX Screener

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    steps:
      # Menggunakan versi terbaru untuk menghindari warning Node.js
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # STEP INI WAJIB MUNCUL DI LOG!
      - name: DEBUG - LIHAT ISI FOLDER
        run: |
          echo "=== DAFTAR FILE DI FOLDER ==="
          ls -la
          echo "============================="

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy
      
      - name: Run IDX Sniper Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
