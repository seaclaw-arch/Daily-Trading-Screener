name: Daily IDX Screener

on:
  schedule:
    - cron: '0 9 * * 1-5'  # Senin-Jumat jam 16:00 WIB (09:00 UTC)
  workflow_dispatch:        # Bisa dijalankan manual

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Update ke v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5  # Update ke v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy
      
      - name: Verify files
        run: |
          echo "=== Checking files ==="
          ls -la
          echo "=== Checking sniper.py ==="
          if [ -f sniper.py ]; then
            echo "✅ sniper.py found"
          else
            echo "❌ sniper.py NOT found!"
            exit 1
          fi
      - name: Debug - Cek isi folder server
        run: ls -la
      - name: Run IDX Sniper Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper.py
